services:
  nanpure:
    build: .
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      - PORT=3000
      - BASE_URL=https://meg4ne.net
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
